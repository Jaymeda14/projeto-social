<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        img{
            width: 100vw;
        }

        }

            display: block;
            padding: 20px;

            background-color: red;
            cursor: pointer;
        }

</head>
<body>
    <img src="imagens/tela-instagram.jpg" alt="insta">
